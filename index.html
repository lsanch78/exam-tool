<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Practice Exam Generator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #f7f6f3;
    color: #2c2c2a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { max-width: 640px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 2rem; }
  .header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 4px; }
  .header p { font-size: 14px; color: #888780; }
  .info-box {
    background: #fff;
    border: 1px solid #e8e6e1;
    border-radius: 14px;
    padding: 1rem 1.25rem;
    margin-bottom: 1rem;
    font-size: 13px;
    color: #5f5e5a;
    line-height: 1.6;
  }
  .info-title { font-weight: 600; font-size: 14px; color: #2c2c2a; margin-bottom: 6px; }
  .timer-card {
    background: #fff;
    border: 1px solid #e8e6e1;
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .timer-label { font-size: 12px; color: #888780; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
  .timer-clock { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 500; color: #2c2c2a; transition: color 0.3s; }
  .timer-clock.warning { color: #E24B4A; }
  .timer-buttons { display: flex; gap: 8px; }
  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid #d3d1c7;
    background: #fff;
    color: #2c2c2a;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { background: #f1efe8; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: #2c2c2a; color: #fff; border-color: #2c2c2a; }
  .btn-primary:hover { background: #444441; }
  .score-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; padding: 0 4px; }
  .score-text { font-size: 14px; color: #888780; }
  .progress-bar-bg { height: 4px; background: #e8e6e1; border-radius: 2px; margin-bottom: 1.25rem; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #1D9E75; border-radius: 2px; width: 0%; transition: width 0.3s ease; }
  .question-list { background: #fff; border: 1px solid #e8e6e1; border-radius: 14px; overflow: hidden; }
  .q-row { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid #f1efe8; transition: background 0.15s; }
  .q-row:last-child { border-bottom: none; }
  .q-row:hover { background: #fafaf8; }
  .q-num { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #b4b2a9; min-width: 32px; }
  .q-label { flex: 1; font-size: 14px; color: #2c2c2a; }
  .q-section { font-weight: 500; }
  .q-actions { display: flex; gap: 6px; }
  .chip {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid #d3d1c7;
    background: #fff;
    color: #888780;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .chip:hover { border-color: #b4b2a9; }
  .chip.right-on { background: #E1F5EE; border-color: #5DCAA5; color: #0F6E56; }
  .chip.wrong-on { background: #FCEBEB; border-color: #F09595; color: #A32D2D; }
  .bottom-bar { text-align: center; margin-top: 1.25rem; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }

  /* Setup screen */
  .setup-card {
    background: #fff;
    border: 1px solid #e8e6e1;
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .setup-card h2 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 13px; font-weight: 500; color: #5f5e5a; margin-bottom: 4px; }
  .field input, .field textarea {
    font-family: 'DM Sans', sans-serif;
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d3d1c7;
    border-radius: 8px;
    font-size: 14px;
    color: #2c2c2a;
    background: #fff;
    transition: border-color 0.15s;
  }
  .field input:focus, .field textarea:focus { outline: none; border-color: #888780; }
  .field textarea { resize: vertical; min-height: 60px; }
  .field .hint { font-size: 12px; color: #b4b2a9; margin-top: 4px; }
  .section-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .section-row input { flex: 1; }
  .section-row input:first-child { flex: 2; }
  .remove-btn {
    font-family: 'DM Sans', sans-serif;
    background: none;
    border: none;
    color: #b4b2a9;
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .remove-btn:hover { color: #E24B4A; }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .section-header label { margin-bottom: 0; }
  .add-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 6px;
    border: 1px solid #d3d1c7;
    background: #fff;
    color: #5f5e5a;
    cursor: pointer;
  }
  .add-btn:hover { background: #f1efe8; }
  .url-box {
    background: #f1efe8;
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #5f5e5a;
    word-break: break-all;
    margin-top: 1rem;
    display: none;
    position: relative;
  }
  .url-box .copy-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid #d3d1c7;
    background: #fff;
    color: #5f5e5a;
    cursor: pointer;
  }
  .url-box .copy-btn:hover { background: #e8e6e1; }

  /* Grade modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    justify-content: center;
    align-items: center;
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 16px;
    max-width: 480px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 1.5rem;
  }
  .modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .modal .big-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 40px;
    font-weight: 500;
    margin: 0.75rem 0;
  }
  .modal .big-score.great { color: #1D9E75; }
  .modal .big-score.ok { color: #BA7517; }
  .modal .big-score.rough { color: #E24B4A; }
  .section-grade {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #f1efe8;
    font-size: 14px;
  }
  .section-grade:last-child { border-bottom: none; }
  .section-grade .name { color: #2c2c2a; font-weight: 500; }
  .section-grade .score { font-family: 'JetBrains Mono', monospace; color: #5f5e5a; }
  .section-grade .bar-bg {
    flex: 1;
    height: 4px;
    background: #e8e6e1;
    border-radius: 2px;
    margin: 0 12px;
    overflow: hidden;
  }
  .section-grade .bar-fill { height: 100%; border-radius: 2px; }
  .missed-list { margin-top: 1rem; font-size: 13px; color: #5f5e5a; line-height: 1.8; }
  .missed-item { color: #A32D2D; }

  @media (max-width: 500px) {
    .timer-card { flex-direction: column; gap: 12px; text-align: center; }
    .q-label { font-size: 13px; }
    .chip { padding: 4px 10px; font-size: 11px; }
  }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div class="container" id="setup-screen">
  <div class="header">
    <h1>Practice exam generator</h1>
    <p>Configure your exam, then share the link with your class</p>
  </div>

  <div class="setup-card">
    <h2>Exam details</h2>
    <div class="field">
      <label>Exam title</label>
      <input type="text" id="cfg-title" value="Practice Exam" placeholder="e.g. Linear Algebra Exam 1">
    </div>
    <div class="field">
      <label>Instructions (optional)</label>
      <textarea id="cfg-instructions" placeholder="e.g. Give yourself two tries per problem. Refresh to get a new random set."></textarea>
    </div>
    <div class="field">
      <label>Timer (minutes)</label>
      <input type="number" id="cfg-timer" value="60" min="1" max="300" style="width: 100px;">
    </div>
    <div class="field">
      <label>Number of exam questions</label>
      <input type="number" id="cfg-count" value="22" min="1" max="200" style="width: 100px;">
    </div>
  </div>

  <div class="setup-card">
    <div class="section-header">
      <h2 style="margin-bottom: 0;">Sections</h2>
      <button class="add-btn" onclick="addSectionRow()">+ Add section</button>
    </div>
    <div class="hint" style="font-size: 12px; color: #b4b2a9; margin-bottom: 12px;">
      Enter each section name and how many problems it has.
    </div>
    <div id="section-rows"></div>
  </div>

  <div style="display: flex; gap: 10px; justify-content: center;">
    <button class="btn btn-primary" onclick="launchExam()" style="padding: 12px 32px; font-size: 14px;">Generate exam</button>
    <button class="btn" onclick="generateLink()" style="padding: 12px 32px; font-size: 14px;">Copy share link</button>
  </div>

  <div class="url-box" id="url-box">
    <span id="url-text"></span>
    <button class="copy-btn" onclick="copyUrl()">Copy</button>
  </div>
</div>

<!-- EXAM SCREEN -->
<div class="container" id="exam-screen" style="display: none;">
  <div class="header">
    <h1 id="exam-title">Practice Exam</h1>
    <p id="exam-subtitle"></p>
  </div>

  <div class="info-box" id="exam-instructions" style="display: none;">
    <div class="info-title">How to use</div>
    <span id="exam-instructions-text"></span>
  </div>

  <div class="timer-card">
    <div>
      <div class="timer-label">Time remaining</div>
      <div class="timer-clock" id="clock">60:00</div>
    </div>
    <div class="timer-buttons">
      <button class="btn btn-primary" id="start-btn" onclick="toggleTimer()">Start</button>
      <button class="btn" onclick="resetTimer()">Reset</button>
    </div>
  </div>

  <div class="score-bar">
    <span class="score-text" id="score-display">0 / 0 answered</span>
    <span class="score-text" id="percent-display"></span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progress-fill"></div>
  </div>

  <div class="question-list" id="questions"></div>

  <div class="bottom-bar">
    <button class="btn" onclick="newExam()" style="padding: 10px 28px; font-size: 14px;">New exam</button>
    <button class="btn btn-primary" onclick="gradeExam()" style="padding: 10px 28px; font-size: 14px;">Grade my exam</button>
    <button class="btn" onclick="goToSetup()" style="padding: 10px 28px; font-size: 14px;">Edit config</button>
  </div>
</div>

<!-- GRADE MODAL -->
<div class="modal-overlay" id="grade-modal" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modal-heading">Your results</h2>
    <div class="big-score" id="modal-score"></div>
    <div id="modal-sections"></div>
    <div class="missed-list" id="modal-missed"></div>
    <div style="text-align: center; margin-top: 1.25rem;">
      <button class="btn" onclick="document.getElementById('grade-modal').className='modal-overlay';" style="padding: 8px 24px;">Close</button>
    </div>
  </div>
</div>

<script>
var config = {
  title: "Practice Exam",
  instructions: "",
  timer: 60,
  count: 22,
  sections: []
};

var questions = [];
var state = {};
var seconds = 3600;
var timerInterval = null;
var running = false;
var examSize = 22;

/* --- SETUP --- */

function addSectionRow(name, total) {
  var container = document.getElementById("section-rows");
  var row = document.createElement("div");
  row.className = "section-row";
  row.innerHTML =
    '<input type="text" placeholder="Section name" value="' + (name || "") + '">' +
    '<input type="number" placeholder="# problems" min="1" style="width:100px;" value="' + (total || "") + '">' +
    '<button class="remove-btn" onclick="this.parentElement.remove()">&times;</button>';
  container.appendChild(row);
}

function readSetupForm() {
  config.title = document.getElementById("cfg-title").value || "Practice Exam";
  config.instructions = document.getElementById("cfg-instructions").value || "";
  config.timer = parseInt(document.getElementById("cfg-timer").value) || 60;
  config.count = parseInt(document.getElementById("cfg-count").value) || 22;
  config.sections = [];

  var rows = document.getElementById("section-rows").children;
  for (var i = 0; i < rows.length; i++) {
    var inputs = rows[i].querySelectorAll("input");
    var name = inputs[0].value.trim();
    var total = parseInt(inputs[1].value);
    if (name && total > 0) {
      config.sections.push({ section: name, total: total });
    }
  }
}

function buildUrlParams() {
  readSetupForm();
  var obj = {
    title: config.title,
    instructions: config.instructions,
    timer: config.timer,
    count: config.count,
    sections: config.sections.map(function(s) { return s.section + ":" + s.total; })
  };
  return "#config=" + encodeURIComponent(JSON.stringify(obj));
}

function generateLink() {
  var hash = buildUrlParams();
  var url = window.location.origin + window.location.pathname + hash;
  document.getElementById("url-text").textContent = url;
  document.getElementById("url-box").style.display = "block";
}

function copyUrl() {
  var text = document.getElementById("url-text").textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.querySelector(".url-box .copy-btn");
      btn.textContent = "Copied!";
      setTimeout(function() { btn.textContent = "Copy"; }, 1500);
    });
  }
}

function launchExam() {
  readSetupForm();
  if (config.sections.length === 0) {
    alert("Add at least one section with problems.");
    return;
  }
  startExamScreen();
}

function goToSetup() {
  if (running) {
    clearInterval(timerInterval);
    running = false;
  }
  document.getElementById("setup-screen").style.display = "";
  document.getElementById("exam-screen").style.display = "none";
}

/* --- URL PARSING --- */

function parseUrlParams() {
  var hash = window.location.hash || "";
  if (hash.indexOf("#config=") !== 0) return false;

  try {
    var json = decodeURIComponent(hash.substring(8));
    var obj = JSON.parse(json);

    config.title = obj.title || "Practice Exam";
    config.instructions = obj.instructions || "";
    config.timer = parseInt(obj.timer) || 60;
    config.count = parseInt(obj.count) || 22;
    config.sections = [];

    if (obj.sections && obj.sections.length) {
      for (var i = 0; i < obj.sections.length; i++) {
        var lastColon = obj.sections[i].lastIndexOf(":");
        if (lastColon > 0) {
          var name = obj.sections[i].substring(0, lastColon);
          var total = parseInt(obj.sections[i].substring(lastColon + 1));
          if (name && total > 0) {
            config.sections.push({ section: name, total: total });
          }
        }
      }
    }

    return config.sections.length > 0;
  } catch (e) {
    return false;
  }
}

function populateSetupFromConfig() {
  document.getElementById("cfg-title").value = config.title;
  document.getElementById("cfg-instructions").value = config.instructions;
  document.getElementById("cfg-timer").value = config.timer;
  document.getElementById("cfg-count").value = config.count;
  document.getElementById("section-rows").innerHTML = "";
  for (var i = 0; i < config.sections.length; i++) {
    addSectionRow(config.sections[i].section, config.sections[i].total);
  }
}

/* --- EXAM ENGINE --- */

function shuffle(arr) {
  var i, j, tmp;
  for (i = arr.length - 1; i > 0; i--) {
    j = Math.floor(Math.random() * (i + 1));
    tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

function pickRandom(arr, n) {
  var copy = arr.slice();
  shuffle(copy);
  return copy.slice(0, n);
}

function generateExamQuestions() {
  var bank = config.sections;
  var totalProblems = 0;
  var i, j;
  for (i = 0; i < bank.length; i++) totalProblems += bank[i].total;

  examSize = Math.min(config.count, totalProblems);
  var qs = [];
  var remaining = examSize;

  for (i = 0; i < bank.length; i++) {
    var sec = bank[i];
    var proportion = sec.total / totalProblems;
    var count;
    if (i === bank.length - 1) {
      count = remaining;
    } else {
      count = Math.round(examSize * proportion);
    }
    if (count < 1) count = 1;
    if (count > sec.total) count = sec.total;
    if (count > remaining) count = remaining;
    remaining -= count;

    var allProbs = [];
    for (j = 1; j <= sec.total; j++) allProbs.push(j);
    var picked = pickRandom(allProbs, count);
    for (j = 0; j < picked.length; j++) {
      qs.push({ section: sec.section, prob: picked[j] });
    }
  }

  if (remaining > 0) {
    var sorted = bank.slice().sort(function(a, b) { return b.total - a.total; });
    for (i = 0; i < sorted.length; i++) {
      if (remaining <= 0) break;
      var sect = sorted[i];
      var existing = [];
      for (j = 0; j < qs.length; j++) {
        if (qs[j].section === sect.section) existing.push(qs[j].prob);
      }
      var available = [];
      for (j = 1; j <= sect.total; j++) {
        if (existing.indexOf(j) === -1) available.push(j);
      }
      var extra = pickRandom(available, Math.min(remaining, available.length));
      for (j = 0; j < extra.length; j++) {
        qs.push({ section: sect.section, prob: extra[j] });
      }
      remaining -= extra.length;
    }
  }

  shuffle(qs);
  for (i = 0; i < qs.length; i++) qs[i].num = i + 1;
  return qs;
}

function startExamScreen() {
  document.getElementById("setup-screen").style.display = "none";
  document.getElementById("exam-screen").style.display = "";

  document.getElementById("exam-title").textContent = config.title;
  document.getElementById("page-title").textContent = config.title;

  var sectionNames = [];
  for (var i = 0; i < config.sections.length; i++) sectionNames.push(config.sections[i].section);
  var first = sectionNames[0] || "";
  var last = sectionNames[sectionNames.length - 1] || "";
  document.getElementById("exam-subtitle").textContent = examSize + " problems \u00B7 " + first + " \u2013 " + last;

  if (config.instructions) {
    document.getElementById("exam-instructions").style.display = "";
    document.getElementById("exam-instructions-text").textContent = config.instructions;
  } else {
    document.getElementById("exam-instructions").style.display = "none";
  }

  seconds = config.timer * 60;
  renderClock();
  renderExam();
}

function renderExam() {
  questions = generateExamQuestions();
  state = {};
  var container = document.getElementById("questions");
  container.innerHTML = "";
  var i, q, row;

  for (i = 0; i < questions.length; i++) {
    q = questions[i];
    state[q.num] = null;
    row = document.createElement("div");
    row.className = "q-row";
    row.innerHTML =
      '<span class="q-num">' + (q.num < 10 ? "0" : "") + q.num + "</span>" +
      '<span class="q-label"><span class="q-section">' + q.section + "</span>, Problem " + q.prob + "</span>" +
      '<div class="q-actions">' +
        '<button class="chip" id="right-' + q.num + "\" onclick=\"mark(" + q.num + ",'right')\">Right</button>" +
        '<button class="chip" id="wrong-' + q.num + "\" onclick=\"mark(" + q.num + ",'wrong')\">Wrong</button>" +
      "</div>";
    container.appendChild(row);
  }
  updateScore();
}

function updateScore() {
  var answered = 0, right = 0, key;
  for (key in state) {
    if (state[key] !== null) answered++;
    if (state[key] === "right") right++;
  }
  document.getElementById("score-display").textContent = answered + " / " + examSize + " answered";
  document.getElementById("progress-fill").style.width = Math.round((answered / examSize) * 100) + "%";
  if (answered > 0) {
    document.getElementById("percent-display").textContent = Math.round((right / answered) * 100) + "% correct";
  } else {
    document.getElementById("percent-display").textContent = "";
  }
}

function mark(num, val) {
  if (state[num] === val) {
    state[num] = null;
    document.getElementById("right-" + num).className = "chip";
    document.getElementById("wrong-" + num).className = "chip";
  } else {
    state[num] = val;
    document.getElementById("right-" + num).className = (val === "right") ? "chip right-on" : "chip";
    document.getElementById("wrong-" + num).className = (val === "wrong") ? "chip wrong-on" : "chip";
  }
  updateScore();
}

function renderClock() {
  var m = Math.floor(seconds / 60);
  var s = seconds % 60;
  var el = document.getElementById("clock");
  el.textContent = (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
  el.className = (seconds <= 300) ? "timer-clock warning" : "timer-clock";
}

function toggleTimer() {
  if (running) {
    clearInterval(timerInterval);
    running = false;
    document.getElementById("start-btn").textContent = "Resume";
  } else {
    running = true;
    document.getElementById("start-btn").textContent = "Pause";
    timerInterval = setInterval(function() {
      if (seconds > 0) {
        seconds--;
        renderClock();
      } else {
        clearInterval(timerInterval);
        running = false;
        document.getElementById("start-btn").textContent = "Done";
      }
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  running = false;
  seconds = config.timer * 60;
  document.getElementById("clock").className = "timer-clock";
  document.getElementById("start-btn").textContent = "Start";
  renderClock();
}

function newExam() {
  var hasAnswers = false, key;
  for (key in state) {
    if (state[key] !== null) { hasAnswers = true; break; }
  }
  if (hasAnswers) {
    if (!confirm("This will clear your current answers and generate a new exam. Continue?")) return;
  }
  resetTimer();
  renderExam();
}

function closeModal(e) {
  if (e.target === document.getElementById("grade-modal")) {
    document.getElementById("grade-modal").className = "modal-overlay";
  }
}

function gradeExam() {
  var i, q, v;
  var sectionMap = {};

  for (i = 0; i < config.sections.length; i++) {
    sectionMap[config.sections[i].section] = { right: 0, wrong: 0, total: 0, missed: [] };
  }

  var totalRight = 0, totalAnswered = 0;

  for (i = 0; i < questions.length; i++) {
    q = questions[i];
    v = state[q.num];
    var entry = sectionMap[q.section];
    if (!entry) continue;
    entry.total++;
    if (v === "right") { entry.right++; totalRight++; totalAnswered++; }
    else if (v === "wrong") { entry.wrong++; totalAnswered++; entry.missed.push("#" + q.prob); }
  }

  var pct = totalAnswered > 0 ? Math.round((totalRight / totalAnswered) * 100) : 0;
  var scoreEl = document.getElementById("modal-score");
  scoreEl.textContent = totalRight + "/" + totalAnswered + " (" + pct + "%)";
  scoreEl.className = "big-score" + (pct >= 80 ? " great" : pct >= 60 ? " ok" : " rough");

  var sectionsHtml = "";
  for (i = 0; i < config.sections.length; i++) {
    var name = config.sections[i].section;
    var data = sectionMap[name];
    if (data.total === 0) continue;
    var secAnswered = data.right + data.wrong;
    var secPct = secAnswered > 0 ? Math.round((data.right / secAnswered) * 100) : 0;
    var barColor = secPct >= 80 ? "#1D9E75" : secPct >= 60 ? "#BA7517" : "#E24B4A";
    sectionsHtml +=
      '<div class="section-grade">' +
        '<span class="name" style="min-width:100px;">' + name + "</span>" +
        '<div class="bar-bg"><div class="bar-fill" style="width:' + secPct + "%;background:" + barColor + ';"></div></div>' +
        '<span class="score">' + data.right + "/" + secAnswered + "</span>" +
      "</div>";
  }
  document.getElementById("modal-sections").innerHTML = sectionsHtml;

  var missedHtml = "";
  for (i = 0; i < config.sections.length; i++) {
    var nm = config.sections[i].section;
    var d = sectionMap[nm];
    if (d.missed.length > 0) {
      missedHtml += '<span class="missed-item">' + nm + ": missed " + d.missed.join(", ") + "</span><br>";
    }
  }
  if (missedHtml) {
    document.getElementById("modal-missed").innerHTML = "<strong>Review these:</strong><br>" + missedHtml;
  } else if (totalAnswered > 0) {
    document.getElementById("modal-missed").innerHTML = "Perfect score!";
  } else {
    document.getElementById("modal-missed").innerHTML = "Mark your answers first!";
  }

  document.getElementById("grade-modal").className = "modal-overlay open";
}
